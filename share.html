<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Link</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .share-box {
            width: 250px;
            height: 250px;
            padding: 15px;
            border: 1px solid black;
            border-radius: 8px;
            background-color: white;
            padding-top: 50px;
        }

        .share-box p {
            text-align: center;
            margin: 300 0 10px;
        }

        .share-box label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-container {
            display: flex;
            align-items: center;
            border: 1px solid black;
            padding: 5px;
            border-radius: 4px;
            background-color: white;
        }

        .input-container i {
            margin-right: 5px;
        }

        .share-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        .copy-button {
            width: 50%;
            margin-top: 10px;
            margin-left: 120px;
            padding: 5px;
            border: 1px solid black;
            background-color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .copy-button:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>

    <div class="share-box">
        <p>Share</p>
        <label>Copy Link</label>
        <div class="input-container">
            <i>🔗</i>
            <input type="text" class="share-input" value="www.tastyhub.com/share-link" readonly>
        </div>
         <a href="#" style="text-decoration:none; color: #000;"><button class="copy-button">Copy</button></a>
    </div>

</body>
</html>
