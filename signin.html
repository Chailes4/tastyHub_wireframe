<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signin-container {
            background: white;
            padding: 20px;
            width: 300px;
            text-align: center;
            border: 2px solid;
        }
        .signin-container p {
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 95%;
            padding: 8px;
            border: 1px solid;
        }
        .signin-btn {
            padding: 10px 100px;
            border: 1px solid;
            cursor: pointer;
            color: black;
        }
        .signin-btn:hover {
            background: #ccc;
        }
        .signup-link {
            margin-top: 20px;
            display: block;
            color: black;
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <p>Sign In</p>
        <form>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" >
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" >
            </div>
            <a class="signin-btn" href="browse.html" style="text-decoration: none;"> Sign In</a>
        </form>
        <a href="register.html" class="signup-link">Don't have an account? Sign Up</a>
    </div>
</body>
</html>
