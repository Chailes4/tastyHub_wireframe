<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .change-password-container {
            background: white;
            padding: 20px;
            width: 300px;
            text-align: center;
            border: 2px solid;
        }
        .change-password-container p {
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 95%;
            padding: 8px;
            border: 1px solid;
        }
        .change-password-btn {
            padding: 10px 85px;
            border: 1px solid;
            cursor: pointer;
            color: black;
        }
        .change-password-btn:hover {
            background: #ccc;
        }
        .back-link {
            margin-top: 10px;
            display: block;
            color: black;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <p>Change Password</p>
        <form>
            <div class="input-group">
                <label for="current-password">Current Password</label>
                <input type="password" id="current-password" placeholder="Enter your current password" required>
            </div>
            <div class="input-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="Enter your new password" required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your new password" required>
            </div>
            <button type="submit" class="change-password-btn">Change Password</button>
        </form>
        <a href="profile.html" class="back-link">Back to Profile</a>
    </div>
</body>
</html>
