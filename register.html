<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background: white;
            padding: 20px;
            width: 300px;
            text-align: center;
            border: 2px solid; /* Border for wireframe effect */
        }
        .register-container p {
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 95%;
            padding: 8px;
            border: 1px solid; /* Border for input fields */
        }
        .signup-btn {
            padding: 10px 100px;
            border: 1px solid;
            cursor: pointer;
            color: black;
            text-decoration: none; /* Remove underline */
        }
        .signup-btn:hover {
            background: #ccc; /* Light gray background on hover */
        }
        .signin-link {
            margin-top: 20px;
        }
        a{
            color: black;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <p>Create an Account</p>
        <form>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
            </div>
            <a class="signup-btn" href="browse.html">Sign Up</a>
        </form>
        <p class="signin-link">Already have an account? <a href="signin.html">Sign In</a></p>
    </div>
</body>
</html>
