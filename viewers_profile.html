        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: solid; border-width:2px  }

        a {text-decoration: none; color: #000;}
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            right: 0;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover { background-color: #ddd; }
        .dropdown:hover .dropdown-content { display: block; }
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            border: 1px solid;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .profile-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px;
        border: 2px solid; 
        background-color: #ffffff; /* White background */
        margin: 10px auto 10px;
        width: 700px;
        text-align: center;
    }
.profile-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    border: 2px solid; 
    border-radius: 5px;
    background-color: #ffffff; /* White background */
    margin: 10px auto 10px;
    width: 700px;
    text-align: center;
}

.row {
    display: flex;
    justify-content: space-between; /* Space between columns */
    width: 100%;

}

.col {
    flex: 1; 
    text-align: left;
    padding: 10px 20px;
}


h5{
    font-weight: normal;
    text-align: center;
}
h6 {
    font-weight: normal;
}
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 30px 50px;
            z-index: 1;
            position: relative;
        }
        .recipe-card {
            position: relative;
            background: #fff;
            padding: 10px;  
            border: 2px solid;
            border-radius: 5px;
            text-align: center;
            overflow: hidden;
        }
        .recipe-card img {
            width: 100%;
            height: 150px;
            max-height: 150px; /* Limit the height */
            object-fit: cover; /* Maintain aspect ratio */
            border: 1px solid; /* Add border */
            border-radius: 5px; /* Match the card's border radius */
        }
        .recipe-card .image-placeholder {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 1px solid;
            border-radius: 2px;
            margin-bottom: 10px;
        }
        .recipe-card p { margin:10px 300px 5px 0px;}
        .recipe-card h6 { margin: 10px 0; font-size: 15px }
        .icons {
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .top-right {
            position: absolute;
            top: 10px;
            right: 8px;
        }
        .badge {
            border: 1px dashed;
            padding: 5px;
            margin-left: 10px;
        }
    </style>
